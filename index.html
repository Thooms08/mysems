<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MYSEMS.MY.ID</title>
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd, #1e3c72);
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }
    .hero-text {
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .sub-text {
      font-size: 1.2rem;
      margin-top: 20px;
      max-width: 700px;
    }
    .icon-row {
      margin-top: 30px;
    }
    .icon-row i {
      font-size: 2rem;
      margin: 0 15px;
      transition: transform 0.3s ease;
    }
    .icon-row i:hover {
      transform: scale(1.3);
      color: #ffc107;
    }
    .animated-circle {
      position: absolute;
      border-radius: 50%;
      opacity: 0.15;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero-text" id="mainText">
      <i class="fa-solid fa-bolt"></i> MYSEMS.MY.ID akan hadir <i class="fa-solid fa-bolt"></i>
    </div>
    <div class="sub-text">
      <i class="fa-solid fa-school"></i> MYSEMS adalah aplikasi web manajemen event sekolah yang terintegrasi dan mudah digunakan, 
      dikhususkan untuk organisasi, sekolah, dan instansi di Indonesia. <i class="fa-solid fa-users"></i>
    </div>
    <div class="icon-row">
      <i class="fa-solid fa-calendar-days"></i>
      <i class="fa-solid fa-chalkboard-teacher"></i>
      <i class="fa-solid fa-network-wired"></i>
      <i class="fa-solid fa-laptop-code"></i>
    </div>
  </div>

  <!-- Anime.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
  <script>
    // Animasi teks looping
    anime({
      targets: '#mainText',
      scale: [0.95, 1.05],
      duration: 2000,
      easing: 'easeInOutSine',
      direction: 'alternate',
      loop: true
    });

    // Animasi background lingkaran
    for (let i = 0; i < 12; i++) {
      let circle = document.createElement('div');
      circle.classList.add('animated-circle');
      document.body.appendChild(circle);

      let size = Math.random() * 150 + 50;
      circle.style.width = size + 'px';
      circle.style.height = size + 'px';
      circle.style.background = 'rgba(255,255,255,0.1)';
      circle.style.top = Math.random() * window.innerHeight + 'px';
      circle.style.left = Math.random() * window.innerWidth + 'px';

      anime({
        targets: circle,
        translateY: [
          { value: -40, duration: 2000 },
          { value: 40, duration: 2000 }
        ],
        translateX: [
          { value: -40, duration: 2000 },
          { value: 40, duration: 2000 }
        ],
        direction: 'alternate',
        loop: true,
        easing: 'easeInOutQuad',
        delay: i * 150
      });
    }
  </script>
</body>
</html>
